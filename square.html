<!DOCTYPE html>
<html>
  <head> </head>
  <body>
    <canvas id="canvas" height="800" width="1000"> </canvas>
  </body>
</html>
<script>
  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");
  var x = [50, 100, 61, 72, 83, 94, 45, 38, 29, 10];
  var y = [50, 100, 61, 72, 83, 94, 45, 38, 29, 10];
  var directionx = [5, 4, 3, 2, 1, 10, 9, 8, 7, 6];
  var directiony = [5, 4, 3, 2, 1, 10, 9, 8, 7, 6];

  setInterval(moveCanvas, 100);

  function moveCanvas() {
    ctx.clearRect(0, 0, 2000, 2000);
    for (var i = 0; i < 10; i = i + 1) {
      ctx.fillRect(x[i], y[i], 20, 20);

      ctx.fillRect(x[0], y[0], 50, 50);
      x[0] = x[0] + directionx[0];
      y[0] = y[0] + directiony[0];
      if (x[0] > 900) {
        directionx[0] = -2;
      }
      //
      if (x[0] < 0) {
        directionx[0] = 5;
      }
      if (y[0] < 0) {
        directiony[0] = 5;
      }
      if (y[0] > 550) {
        directiony[0] = -5;
      }
    }
      ctx.fillRect(x[1], y[1], 50, 50);
      x[1] = x[1] + directionx[1];
      y[1] = y[1] + directiony[1];
      if (x[1] > 900) {
        directionx[1] = -3;
      }
      //
      if (x[1] < 0) {
        directionx[1] = 10;
      }
      if (y[1] < 0) {
        directiony[1] = 10;
      }
      if (y[1] > 550) {
        directiony[1] = -10;
      }
    }
</script>
